      <path d="M401 390c62 7 147-7 262-95-73-18-175-22-276-10 4 31 9 66 14 105Z" fill="#9f55f1" opacity="0.82"/>
      <path d="M230 319c-6-26 28-41 77-34 31 4 61 17 77 37-36-3-91 0-154-3Z" fill="#effcff" opacity="0.92"/>
