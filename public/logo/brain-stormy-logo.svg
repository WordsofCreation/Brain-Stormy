    </g>

    <path d="M73 399c13-61 74-99 153-105 52-4 86 12 128 18 59 9 86-30 154-35 118-9 234 47 262 125" fill="none" stroke="url(#rim)" stroke-width="3.4" opacity="0.86"/>
