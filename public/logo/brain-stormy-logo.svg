<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 838 646" role="img" aria-labelledby="title desc">
  <title id="title">Brain Stormy glowing brain logo</title>
  <desc id="desc">A neon cyan and violet brain mark with a dark radial burst background.</desc>
  <defs>
    <radialGradient id="bg" cx="42%" cy="32%" r="82%">
      <stop offset="0" stop-color="#264a6d"/>
      <stop offset="0.42" stop-color="#183258"/>
      <stop offset="0.74" stop-color="#2b2350"/>
      <stop offset="1" stop-color="#101833"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="45%" cy="48%" r="58%">
      <stop offset="0" stop-color="#7effff" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#2fe6f5" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#19bed7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="58%" cy="48%" r="58%">
      <stop offset="0" stop-color="#f184ff" stop-opacity="0.9"/>
      <stop offset="0.48" stop-color="#bc5af4" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#8a35e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brainCyan" x1="110" x2="680" y1="270" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#43edf6"/>
      <stop offset="0.48" stop-color="#28d6ea"/>
      <stop offset="1" stop-color="#35dff2"/>
    </linearGradient>
    <linearGradient id="brainViolet" x1="85" x2="760" y1="355" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#db67f8"/>
      <stop offset="0.52" stop-color="#aa55ed"/>
      <stop offset="1" stop-color="#db70f6"/>
    </linearGradient>
    <linearGradient id="rim" x1="68" x2="780" y1="292" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27e9ff" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#9af7ff" stop-opacity="0.85"/>
      <stop offset="0.7" stop-color="#d98cff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#f09bff" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-45%" width="160%" height="190%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" values="1 0 0 0 0.05 0 1 0 0 0.85 0 0 1 0 1 0 0 0 0.72 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tinyGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="brainClip">
